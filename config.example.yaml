# OpenSentry CloudNode Configuration Example

# Node identification
node:
  # Friendly name shown in dashboard (optional, auto-generated if empty)
  name: ""

# Cloud connection settings
cloud:
  # OpenSentry Command Center URL
  api_url: "http://localhost:8000"
  
  # Heartbeat interval in seconds (default: 30)
  heartbeat_interval: 30

# Camera settings
cameras:
  # Auto-detect USB cameras on startup
  auto_detect: true
  
  # Manual camera list (used if auto_detect is false)
  # devices:
  #   - "/dev/video0"
  #   - "/dev/video1"

# Streaming settings per camera
streaming:
  # Target frames per second
  fps: 30

  # JPEG quality (1-100)
  jpeg_quality: 85

  # Video encoder override (leave empty for auto-detection)
  # Options: h264_nvenc, h264_qsv, h264_amf, h264_v4l2m2m, libx264
  # encoder: ""

  # HLS-specific settings
  hls:
    # Enable HLS streaming
    enabled: true
    # Segment duration in seconds
    segment_duration: 1
    # Number of segments to keep in playlist
    playlist_size: 15
    # Target bitrate (e.g. "2500k")
    bitrate: "2500k"

# Motion detection settings
motion:
  # Enable motion detection (default: true)
  enabled: true
  # Sensitivity threshold 0.0-1.0 (default: 0.3)
  sensitivity: 0.3
  # Cooldown between events in seconds (default: 30)
  cooldown_secs: 30

# Recording settings
# NOTE: Recording config is only loaded from the SQLite database (via setup wizard),
# not from this YAML file. These values are shown for reference only.
# recording:
#   enabled: true
#   format: "mp4"


storage:
  # Base path for recordings and snapshots
  path: "./data"
  
  # Maximum storage size in GB (oldest recordings deleted when exceeded)
  max_size_gb: 64

# HTTP server settings (for serving recordings)
server:
  # Port for HTTP API
  port: 8080
  
  # Bind address
  bind: "0.0.0.0"

# Logging settings
logging:
  # Log level: trace, debug, info, warn, error
  level: "info"