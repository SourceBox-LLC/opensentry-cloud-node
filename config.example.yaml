# OpenSentry CloudNode Configuration Example

# Node identification
node:
  # Friendly name shown in dashboard (optional, auto-generated if empty)
  name: ""

# Cloud connection settings
cloud:
  # OpenSentry Command Center URL
  api_url: "http://localhost:8000"
  
  # Heartbeat interval in seconds (default: 30)
  heartbeat_interval: 30

# Camera settings
cameras:
  # Auto-detect USB cameras on startup
  auto_detect: true
  
  # Manual camera list (used if auto_detect is false)
  # devices:
  #   - "/dev/video0"
  #   - "/dev/video1"

# Streaming settings per camera
streaming:
  # Target frames per second
  fps: 30

  # JPEG quality (1-100)
  jpeg_quality: 85

  # Video encoder override. Leave empty for auto-detect (NVENC/QSV/AMF/libx264).
  # Examples: "h264_nvenc", "h264_qsv", "h264_amf", "libx264"
  encoder: ""

  # HLS muxer settings
  hls:
    # Enable HLS streaming (must be true for cloud streaming)
    enabled: true

    # Segment duration in seconds
    segment_duration: 1

    # Number of segments kept in the rolling playlist
    playlist_size: 15

    # Video bitrate (e.g. "2500k")
    bitrate: "2500k"

# Motion detection (second FFmpeg process per camera runs a scene-change filter)
motion:
  # Enable motion detection
  enabled: true

  # Scene-change threshold (0.0 = identical frames, 1.0 = totally different).
  # Lower values are more sensitive — 0.02 is a good default for typical indoor
  # lighting. Raise if you get noise from compression/autoexposure flicker.
  threshold: 0.02

  # Minimum seconds between reported motion events per camera (cooldown).
  cooldown_secs: 30

# Recording settings
recording:
  # Enable local recording
  enabled: true

  # Recording format: "mp4" or "mkv"
  format: "mp4"


storage:
  # Base path for recordings and snapshots
  path: "./data"
  
  # Maximum storage size in GB (oldest recordings deleted when exceeded)
  max_size_gb: 64

# HTTP server settings (for serving recordings)
server:
  # Port for HTTP API
  port: 8080
  
  # Bind address
  bind: "0.0.0.0"

# Logging settings
logging:
  # Log level: trace, debug, info, warn, error
  level: "info"