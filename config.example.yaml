# OpenSentry CloudNode Configuration Example

# Node identification
node:
  # Friendly name shown in dashboard (optional, auto-generated if empty)
  name: ""

# Cloud connection settings
cloud:
  # OpenSentry Command Center URL
  api_url: "http://localhost:8000"
  
  # Heartbeat interval in seconds (default: 30)
  heartbeat_interval: 30

# Camera settings
cameras:
  # Auto-detect USB cameras on startup
  auto_detect: true
  
  # Manual camera list (used if auto_detect is false)
  # devices:
  #   - "/dev/video0"
  #   - "/dev/video1"

# Streaming settings per camera
streaming:
  # Target frames per second
  fps: 30

  # JPEG quality (1-100)
  jpeg_quality: 85

  # Video encoder override. Leave empty ("") to auto-detect the best available
  # hardware encoder (h264_nvenc, h264_qsv, h264_amf, h264_v4l2m2m) and fall
  # back to software (libx264). Can also be overridden via the
  # OPENSENTRY_ENCODER environment variable.
  encoder: ""

  # HLS streaming settings
  hls:
    # Enable HLS streaming output
    enabled: true

    # Segment duration in seconds
    segment_duration: 1

    # Number of segments kept in the rolling playlist
    playlist_size: 15

    # Target video bitrate (e.g. "2500k", "1500k")
    bitrate: "2500k"

# Recording settings
recording:
  # Enable local recording
  enabled: true
  
  # Recording format: "mp4" or "mkv"
  format: "mp4"
  
storage:
  # Base path for recordings and snapshots
  path: "./data"
  
  # Maximum storage size in GB (oldest recordings deleted when exceeded)
  max_size_gb: 64

# HTTP server settings (for serving recordings)
server:
  # Port for HTTP API
  port: 8080
  
  # Bind address
  bind: "0.0.0.0"

# Logging settings
logging:
  # Log level: trace, debug, info, warn, error
  level: "info"