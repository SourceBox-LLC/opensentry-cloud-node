# OpenSentry CloudNode Configuration Example

# Node identification
node:
  # Friendly name shown in dashboard (optional, auto-generated if empty)
  name: ""

# Cloud connection settings
cloud:
  # OpenSentry Command Center URL
  api_url: "http://localhost:8000"
  
  # Heartbeat interval in seconds (default: 30)
  heartbeat_interval: 30

# Camera settings
cameras:
  # Auto-detect USB cameras on startup
  auto_detect: true
  
  # Manual camera list (used if auto_detect is false)
  # devices:
  #   - "/dev/video0"
  #   - "/dev/video1"

# Streaming settings per camera
streaming:
  # Target frames per second
  fps: 30

  # JPEG quality (1-100)
  jpeg_quality: 85

  # Video encoder override (auto-detected if empty)
  # Supported: h264_nvenc (NVIDIA), h264_qsv (Intel), h264_amf (AMD), libx264 (CPU)
  # encoder: ""

  # HLS output settings
  hls:
    enabled: true
    # Segment duration in seconds
    segment_duration: 1
    # Number of segments in the rolling playlist window
    playlist_size: 15
    # Target bitrate (e.g. "2M" for 2 Mbps)
    # bitrate: "2M"

# Motion detection settings
motion:
  # Toggle motion detection on/off
  enabled: true
  # Scene-change score threshold (0.0 = identical, 1.0 = totally different)
  threshold: 0.02
  # Minimum seconds between events per camera
  cooldown_secs: 30

# Recording settings
recording:
  # Enable local recording
  enabled: true
  
  # Recording format: "mp4" or "mkv"
  format: "mp4"
  
storage:
  # Base path for recordings and snapshots
  path: "./data"
  
  # Maximum storage size in GB (oldest recordings deleted when exceeded)
  max_size_gb: 64

# HTTP server settings — local HLS preview + Docker healthcheck
server:
  # Port for HTTP API
  port: 8080

  # Bind address. Defaults to 127.0.0.1 because the server has no auth and
  # exposes HLS segments — binding to 0.0.0.0 lets anyone on the LAN pull
  # live video. Only change this if you explicitly want LAN-local playback.
  bind: "127.0.0.1"

# Logging settings
logging:
  # Log level: trace, debug, info, warn, error
  level: "info"